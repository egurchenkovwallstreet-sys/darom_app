<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="Даром — бесплатная передача вещей">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="darom_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="preload" as="image" href="images/earth.png">

  <title>Даром</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #001F3F;
    }

    /* Фон при загрузке — те же слои, что в MidnightGlowScreen (градиент + планета слева + overlay). */
    #darom-splash {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    #darom-splash .splash-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom right, #001F3F, #008C8C, #00BFFF);
    }

    #darom-splash .splash-planet {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
    }

    #darom-splash .splash-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom right,
        rgba(0, 31, 63, 0.7),
        rgba(0, 140, 140, 0.3),
        rgba(0, 191, 255, 0.2)
      );
    }

    /* Когда Flutter готов — убираем HTML-фон, остаётся только Flutter. */
    body:has(flutter-view) #darom-splash {
      display: none;
    }
  </style>
</head>
<body>
  <div id="darom-splash" aria-hidden="true">
    <div class="splash-gradient"></div>
    <img class="splash-planet" src="images/earth.png" alt="">
    <div class="splash-overlay"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
