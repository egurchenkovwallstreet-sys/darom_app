<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="description" content="Даром — бесплатная передача вещей">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Даром">
  <!-- iOS «На экран Домой» — v=3 квадратная иконка -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png?v=3">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png?v=3">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png?v=3">
  <link rel="apple-touch-icon" href="icons/Icon-192.png?v=3">

  <link rel="icon" type="image/png" href="favicon.png?v=3"/>
  <link rel="preload" as="image" href="images/earth.png">
  <link rel="preload" href="canvaskit/canvaskit.wasm" as="fetch" type="application/wasm" crossorigin>
  <link rel="preload" href="assets/fonts/NotoSans-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/NotoSans-Bold.ttf" as="font" type="font/ttf" crossorigin>

  <title>Даром</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #001F3F;
    }

    /* Фон при загрузке — те же слои, что в MidnightGlowScreen (градиент + планета слева + overlay). */
    #darom-splash {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #darom-splash.is-hiding {
      opacity: 0;
    }

    #darom-splash .splash-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom right, #001F3F, #008C8C, #00BFFF);
    }

    #darom-splash .splash-planet {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: left center;
      transform-origin: left center;
      animation: splash-planet-zoom 10s ease-out forwards;
    }

    @keyframes splash-planet-zoom {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    #darom-splash .splash-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom right,
        rgba(0, 31, 63, 0.7),
        rgba(0, 140, 140, 0.3),
        rgba(0, 191, 255, 0.2)
      );
    }

    /* Скрытие — сразу после появления flutter-view (см. script внизу). */
  </style>
</head>
<body>
  <div id="darom-splash" aria-hidden="true">
    <div class="splash-gradient"></div>
    <img class="splash-planet" src="images/earth.png" alt="">
    <div class="splash-overlay"></div>
  </div>
  <script>
    (function () {
      var splash = document.getElementById('darom-splash');
      if (!splash) return;

      var hideDelayMs = 0;
      var fadeMs = 350;
      var scheduled = false;

      function scheduleHide() {
        if (scheduled) return;
        scheduled = true;
        setTimeout(function () {
          splash.classList.add('is-hiding');
          setTimeout(function () {
            splash.style.display = 'none';
          }, fadeMs);
        }, hideDelayMs);
      }

      function onFlutterReady() {
        if (document.querySelector('flutter-view')) {
          scheduleHide();
          return true;
        }
        return false;
      }

      if (onFlutterReady()) return;

      var observer = new MutationObserver(function () {
        if (onFlutterReady()) observer.disconnect();
      });
      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
  <script src="push_helper.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
