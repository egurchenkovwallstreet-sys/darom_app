<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="darom_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Даром</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #001F3F;
    }

    /* Фон под Flutter — заполняет экран, если клавиатура меняет высоту */
    #darom-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(
          135deg,
          rgba(0, 31, 63, 0.72) 0%,
          rgba(0, 140, 140, 0.32) 50%,
          rgba(0, 191, 255, 0.22) 100%
        ),
        url('assets/assets/images/earth.png') center center / cover no-repeat,
        linear-gradient(135deg, #001F3F 0%, #008C8C 50%, #00BFFF 100%);
    }
  </style>
</head>
<body>
  <div id="darom-backdrop" aria-hidden="true"></div>
  <script>
    // Только подгонка фона при клавиатуре — без вмешательства во Flutter DOM.
    (function () {
      function syncBackdrop() {
        var backdrop = document.getElementById('darom-backdrop');
        if (!backdrop) return;
        var vv = window.visualViewport;
        var height = vv ? vv.height : window.innerHeight;
        var top = vv ? vv.offsetTop : 0;
        backdrop.style.height = height + 'px';
        backdrop.style.top = top + 'px';
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncBackdrop);
        window.visualViewport.addEventListener('scroll', syncBackdrop);
      }
      window.addEventListener('resize', syncBackdrop);
      window.addEventListener('orientationchange', syncBackdrop);
      document.addEventListener('focusout', function () {
        setTimeout(syncBackdrop, 100);
      });
      window.addEventListener('load', syncBackdrop);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
