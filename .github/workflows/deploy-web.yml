# Сборка Flutter Web и выкладка на Timeweb через API (порт 3000).
# Секреты: VPS_HOST, DEPLOY_SECRET (см. deploy/README.md).

name: Deploy Flutter Web

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'backend/src/routes/deploy_web.js'
      - 'backend/src/routes/deploy_backend.js'
      - 'backend/scripts/deploy_backend.sh'
      - 'backend/src/config.js'
      - 'backend/src/index.js'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "❌ Нет секрета VPS_HOST" && exit 1)
          test -n "${{ secrets.DEPLOY_SECRET }}" || (echo "❌ Нет секрета DEPLOY_SECRET" && exit 1)
          echo "✅ Секреты на месте"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --no-web-resources-cdn

      - name: Pack build
        run: |
          test -f build/web/index.html || (echo "❌ build/web/index.html не найден" && exit 1)
          tar -czf web-build.tar.gz -C build/web .
          ls -lh web-build.tar.gz

      - name: Upload to server via API
        run: |
          set +e
          RESPONSE=/tmp/deploy-response.txt
          DEPLOY_URL="https://darom-app.online/api/deploy-web"
          FALLBACK_URL="http://${{ secrets.VPS_HOST }}:3000/api/deploy-web"

          post_deploy() {
            curl -sS --connect-timeout 30 --max-time 300 \
              -w "%{http_code}" -o "$RESPONSE" \
              -X POST \
              -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
              -F "archive=@web-build.tar.gz" \
              "$1"
          }

          HTTP_CODE=$(post_deploy "$DEPLOY_URL")
          CURL_EXIT=$?
          if [ "$CURL_EXIT" -ne 0 ] || [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" = "000" ]; then
            echo "HTTPS недоступен, пробуем :3000 ..."
            HTTP_CODE=$(post_deploy "$FALLBACK_URL")
            CURL_EXIT=$?
          fi

          echo "HTTP ${HTTP_CODE:-нет}"
          cat "$RESPONSE" 2>/dev/null || true
          if [ "$CURL_EXIT" -ne 0 ] || [ -z "$HTTP_CODE" ] || [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            if [ "$HTTP_CODE" = "403" ]; then
              echo "❌ 403 — DEPLOY_SECRET в GitHub не совпадает с backend/.env на сервере"
            else
              echo "❌ Загрузка на сервер не удалась (HTTP ${HTTP_CODE:-нет}, curl=$CURL_EXIT). pm2 logs darom-api"
            fi
            exit 1
          fi
