# Сборка Flutter Web и выкладка на Timeweb при push в main.
# Секреты: VPS_HOST, VPS_USER, VPS_SSH_KEY (см. deploy/README.md).

name: Deploy Flutter Web

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check GitHub secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "❌ Нет секрета VPS_HOST" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "❌ Нет секрета VPS_USER" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "❌ Нет секрета VPS_SSH_KEY" && exit 1)
          echo "✅ Секреты на месте"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Pack build
        run: |
          test -f build/web/index.html || (echo "❌ build/web/index.html не найден" && exit 1)
          tar -czf web-build.tar.gz -C build/web .
          ls -lh web-build.tar.gz

      - name: Install SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          # Убираем Windows-переносы строк (CRLF), если ключ копировали из PowerShell
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          echo "✅ SSH-ключ валидный"
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload archive to server
        run: |
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            web-build.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/web-build.tar.gz"

      - name: Extract on server
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'rm -rf /var/www/darom/* && tar -xzf /tmp/web-build.tar.gz -C /var/www/darom && rm -f /tmp/web-build.tar.gz && echo "OK:" && ls -la /var/www/darom/ | head -8'
