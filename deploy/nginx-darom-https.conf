# Nginx: darom-app.online + HTTPS + прокси API /api/ → localhost:3000
# После certbot блок listen 443 ssl заполнится автоматически.
# HTTP (порт 80) — редирект на HTTPS (certbot добавит return 301).

server {
    listen 80;
    listen [::]:80;
    server_name darom-app.online www.darom-app.online 5.129.243.246;

    root /var/www/darom;
    index index.html;

    # Flutter Web (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API через nginx — без :3000 в URL (нужно для HTTPS).
    # ^~ — иначе regex ниже (.jpg/.png) перехватит /api/photos/listings/*.jpg → 404.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
