# Nginx: Flutter Web на порту 80, API пока на :3000 (как в api_config.dart)

server {
    listen 80;
    listen [::]:80;
    server_name darom-app.online www.darom-app.online 5.129.243.246;

    root /var/www/darom;
    index index.html;

    # Flutter Web (SPA — все пути → index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # API через nginx. ^~ — иначе regex статики (.jpg/.png) ломает /api/photos/listings/*.jpg
    # location ^~ /api/ {
    #     proxy_pass http://127.0.0.1:3000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
