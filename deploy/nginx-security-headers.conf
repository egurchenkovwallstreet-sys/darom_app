# Этап I-D — заголовки безопасности для HTTPS (darom-app.online)
# Подключение: в блоке server { listen 443 ssl ... } добавьте одну строку:
#   include /opt/darom_app/deploy/nginx-security-headers.conf;

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
# Flutter Web + Firebase push + карта OSM + фото https:
# Observatory: B+ (80) — «unsafe-inline» в script-src нужен Flutter Web; без него сайт не запустится.
# object-src / base-uri / form-action — доп. защита (не снимает −20 за inline, но закрывает другие векторы).
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self' https://auth.robokassa.ru; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://darom-app.online https://*.googleapis.com https://*.google.com https://fcm.googleapis.com https://firebaseinstallations.googleapis.com https://tile.openstreetmap.org wss:; font-src 'self' data:; frame-src 'self' https://auth.robokassa.ru;" always;
